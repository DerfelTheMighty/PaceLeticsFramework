<polygon points="1234.5,409.0 1249.5,424.0 1234.5,439.0 1219.5,424.0" fill="#e11d48"/>
<text x="1460.0" y="461.0" text-anchor="end" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" font-weight="400" fill="#475569" >0.04 [-0.46, 0.53]</text>
<line x1="1120.0" y1="643.0" x2="1460.0" y2="643.0" stroke="#243447" stroke-width="3"/>
<text x="1290.0" y="699.0" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16" font-weight="700" fill="#334155" >standardized mean difference (SMD, 95% CI)</text>
<rect x="80" y="745" width="1440" height="78" rx="14" fill="#eff6ff" stroke="#bfdbfe" stroke-width="2"/>
<rect x="80" y="745" width="8" height="78" rx="4" fill="#0891b2"/>
<text x="106.0" y="779.0" text-anchor="start" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="20" font-weight="840" fill="#0f172a" >Interpretation</text>
<text x="106.0" y="807.0" text-anchor="start" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="17" font-weight="400" fill="#475569" >High mechanical loading is not inherently bad: in Bohm et al., tendon stiffness improved strongly with high intensity, while low intensity was near zero.</text>
<text x="80.0" y="862.0" text-anchor="start" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" font-weight="400" fill="#64748b" >Source data: Bohm, Mersmann &amp; Arampatzis 2015, Sports Medicine - Open; aggregate SMDs and 95% CIs reported in Results/Subgroup Analysis.</text>
</svg>