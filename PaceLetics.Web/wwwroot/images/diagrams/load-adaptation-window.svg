<text x="864.0" y="431.0" text-anchor="start" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="19" font-weight="760" fill="#1e293b" >Low intensity &lt;70% MVC/RM</text>
<text x="864.0" y="459.0" text-anchor="start" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" font-weight="400" fill="#64748b" >N=5</text>
<line x1="1145.1" y1="424.0" x2="1322.2" y2="424.0" stroke="#e11d48" stroke-width="6" stroke-linecap="round"/>
