<polygon points="520.3,514.0 535.3,529.0 520.3,544.0 505.3,529.0" fill="#64748b"/>
<text x="710.0" y="566.0" text-anchor="end" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" font-weight="400" fill="#475569" >0.24 [0.07, 0.42]</text>
<line x1="370.0" y1="643.0" x2="710.0" y2="643.0" stroke="#243447" stroke-width="3"/>
<text x="540.0" y="699.0" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16" font-weight="700" fill="#334155" >standardized mean difference (SMD, 95% CI)</text>
<rect x="830.0" y="150.0" width="690.0" height="565.0" rx="16" fill="#ffffff" stroke="#d9e2ec" stroke-width="2"/>
<text x="864.0" y="194.0" text-anchor="start" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="25" font-weight="850" fill="#0f172a" >Does loading intensity matter?</text>
<text x="864.0" y="224.0" text-anchor="start" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16" font-weight="400" fill="#64748b" >Stiffness adaptation differed by intensity (p &lt; 0.00001).</text>
<line x1="1137.9" y1="265.0" x2="1137.9" y2="643.0" stroke="#e2e8f0" stroke-width="2"/>
<text x="1137.9" y="676.0" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" font-weight="400" fill="#64748b" >-0.5</text>
<line x1="1227.4" y1="265.0" x2="1227.4" y2="643.0" stroke="#e2e8f0" stroke-width="2"/>
<text x="1227.4" y="676.0" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" font-weight="400" fill="#64748b" >0</text>
<line x1="1316.8" y1="265.0" x2="1316.8" y2="643.0" stroke="#e2e8f0" stroke-width="2"/>
<text x="1316.8" y="676.0" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" font-weight="400" fill="#64748b" >0.5</text>
<line x1="1406.3" y1="265.0" x2="1406.3" y2="643.0" stroke="#e2e8f0" stroke-width="2"/>
<text x="1406.3" y="676.0" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" font-weight="400" fill="#64748b" >1</text>
<line x1="1227.4" y1="265.0" x2="1227.4" y2="643.0" stroke="#475569" stroke-width="3" stroke-dasharray="8 8"/>
<text x="1227.4" y="248.0" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" font-weight="400" fill="#475569" >no effect</text>
<text x="864.0" y="326.0" text-anchor="start" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="19" font-weight="760" fill="#1e293b" >High intensity &gt;70% MVC/RM</text>
<text x="864.0" y="354.0" text-anchor="start" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" font-weight="400" fill="#64748b" >N=27</text>
<line x1="1354.4" y1="319.0" x2="1420.6" y2="319.0" stroke="#059669" stroke-width="6" stroke-linecap="round"/>
