<line x1="477.4" y1="265.0" x2="477.4" y2="643.0" stroke="#e2e8f0" stroke-width="2"/>
<text x="477.4" y="676.0" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" font-weight="400" fill="#64748b" >0</text>
<line x1="566.8" y1="265.0" x2="566.8" y2="643.0" stroke="#e2e8f0" stroke-width="2"/>
<text x="566.8" y="676.0" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" font-weight="400" fill="#64748b" >0.5</text>
<line x1="656.3" y1="265.0" x2="656.3" y2="643.0" stroke="#e2e8f0" stroke-width="2"/>
<text x="656.3" y="676.0" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" font-weight="400" fill="#64748b" >1</text>
<line x1="477.4" y1="265.0" x2="477.4" y2="643.0" stroke="#475569" stroke-width="3" stroke-dasharray="8 8"/>
<text x="477.4" y="248.0" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" font-weight="400" fill="#475569" >no effect</text>
<text x="114.0" y="326.0" text-anchor="start" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="19" font-weight="760" fill="#1e293b" >Tendon stiffness</text>
<text x="114.0" y="354.0" text-anchor="start" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" font-weight="400" fill="#64748b" >N=37</text>
<line x1="568.6" y1="319.0" x2="634.8" y2="319.0" stroke="#0891b2" stroke-width="6" stroke-linecap="round"/>
<line x1="568.6" y1="306.0" x2="568.6" y2="332.0" stroke="#0891b2" stroke-width="4" stroke-linecap="round"/>
<line x1="634.8" y1="306.0" x2="634.8" y2="332.0" stroke="#0891b2" stroke-width="4" stroke-linecap="round"/>
<polygon points="602.6,304.0 617.6,319.0 602.6,334.0 587.6,319.0" fill="#0891b2"/>
<text x="710.0" y="356.0" text-anchor="end" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" font-weight="400" fill="#475569" >0.70 [0.51, 0.88]</text>
<text x="114.0" y="431.0" text-anchor="start" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="19" font-weight="760" fill="#1e293b" >Young&#x27;s modulus</text>
<text x="114.0" y="459.0" text-anchor="start" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" font-weight="400" fill="#64748b" >N=17</text>
