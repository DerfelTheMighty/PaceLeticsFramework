<text x="710.0" y="461.0" text-anchor="end" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" font-weight="400" fill="#475569" >0.69 [0.36, 1.03]</text>
<text x="114.0" y="536.0" text-anchor="start" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="19" font-weight="760" fill="#1e293b" >Cross-sectional area</text>
<text x="114.0" y="564.0" text-anchor="start" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" font-weight="400" fill="#64748b" >N=33</text>
