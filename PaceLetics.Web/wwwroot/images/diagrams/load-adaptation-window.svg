<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
<title id="title">Bohm et al. 2015 tendon adaptation effect sizes</title>
<desc id="desc">Effect-size diagram using pooled standardized mean differences and confidence intervals from Bohm et al. 2015.</desc>
<rect width="1600" height="900" fill="#f8fafc"/>
<text x="80.0" y="62.0" text-anchor="start" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="36" font-weight="860" fill="#102033" >Tendon Adaptation From Mechanical Loading</text>
<text x="80.0" y="97.0" text-anchor="start" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="19" font-weight="400" fill="#64748b" >Bohm et al. 2015 meta-analysis: pooled SMDs with 95% confidence intervals.</text>
<rect x="80.0" y="150.0" width="690.0" height="565.0" rx="16" fill="#ffffff" stroke="#d9e2ec" stroke-width="2"/>
<text x="114.0" y="194.0" text-anchor="start" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="25" font-weight="850" fill="#0f172a" >What changes in the tendon?</text>
<text x="114.0" y="224.0" text-anchor="start" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16" font-weight="400" fill="#64748b" >All pooled intervention effects were significant.</text>
<line x1="387.9" y1="265.0" x2="387.9" y2="643.0" stroke="#e2e8f0" stroke-width="2"/>
