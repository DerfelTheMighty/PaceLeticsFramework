<title id="title">Twenty-four-month stepwise pace adaptation</title>
<desc id="desc">Conceptual simulation where training pace is held constant for six months and then increased every six months.</desc>
<rect width="1600" height="980" fill="#f8fafc"/>
<text x="76.0" y="62.0" text-anchor="start" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="35" font-weight="850" fill="#102033" >24-Month Adaptation With 6-Month Pace Blocks</text>
