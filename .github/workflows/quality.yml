name: Quality Gate

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  build-and-test:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore PaceLeticsFramework.sln

      - name: Build
        run: dotnet build PaceLeticsFramework.sln --no-restore

      - name: Test
        run: dotnet test PaceLeticsFramework.sln --no-build --verbosity normal
